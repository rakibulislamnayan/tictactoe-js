<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0f;
      --surface: #1a1a1c;
      --surface2: #232325;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.18);
      --text: #f0ede8;
      --text-muted: rgba(240,237,232,0.45);
      --x-color: #c8a97e;
      --o-color: #7eb8c8;
      --win-bg: rgba(200,169,126,0.12);
      --win-border: rgba(200,169,126,0.5);
      --radius: 10px;
      --radius-lg: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* subtle grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .wrapper {
      position: relative;
      width: 100%;
      max-width: 440px;
    }

    /* ---- header ---- */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 2rem;
    }
    .game-title {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 2rem;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .game-title em {
      font-style: italic;
      color: var(--x-color);
    }
    .version-tag {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding-bottom: 2px;
    }

    /* ---- score strip ---- */
    .score-strip {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      margin-bottom: 1.5rem;
      align-items: center;
    }
    .score-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      text-align: center;
    }
    .score-card.x-card { border-top: 2px solid var(--x-color); }
    .score-card.o-card { border-top: 2px solid var(--o-color); }
    .score-label { font-size: 10px; letter-spacing: 0.12em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
    .score-num { font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 600; line-height: 1; }
    .score-card.x-card .score-num { color: var(--x-color); }
    .score-card.o-card .score-num { color: var(--o-color); }
    .draw-card { text-align: center; }
    .draw-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .draw-num { font-family: 'Fraunces', serif; font-size: 1.25rem; font-weight: 300; color: var(--text-muted); }

    /* ---- mode & difficulty ---- */
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .pill-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--border-strong);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.18s;
    }
    .pill-btn:hover { color: var(--text); border-color: var(--text); }
    .pill-btn.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    .diff-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      align-items: center;
    }
    .diff-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; margin-right: 4px; }

    /* ---- status ---- */
    .status {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 1.25rem;
      min-height: 20px;
      letter-spacing: 0.04em;
    }
    .status .who { color: var(--text); font-weight: 500; }
    .status .x-col { color: var(--x-color); }
    .status .o-col { color: var(--o-color); }

    /* ---- board ---- */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.25rem;
    }
    .cell {
      aspect-ratio: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fraunces', serif;
      font-size: 2.4rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    .cell::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.15s;
      border-radius: inherit;
    }
    .cell:hover:not(.taken)::after { background: rgba(255,255,255,0.03); }
    .cell:active:not(.taken) { transform: scale(0.94); }
    .cell.taken { cursor: default; }
    .cell.x-mark { color: var(--x-color); }
    .cell.o-mark { color: var(--o-color); }
    .cell.win-cell {
      background: var(--win-bg);
      border-color: var(--win-border);
    }
    .cell.pop { animation: pop 0.2s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes pop {
      0% { transform: scale(0.6); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ---- actions ---- */
    .actions { display: flex; gap: 8px; }
    .action-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 8px 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border-strong);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.18s;
    }
    .action-btn:hover { color: var(--text); border-color: var(--text); background: var(--surface2); }
    .action-btn.primary {
      border-color: var(--text);
      color: var(--text);
    }

    /* ---- footer ---- */
    .footer {
      margin-top: 2rem;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1 class="game-title">Tic<em>Tac</em>Toe</h1>
    <span class="version-tag">v1.0</span>
  </div>

  <div class="score-strip">
    <div class="score-card x-card">
      <div class="score-label">Player X</div>
      <div class="score-num" id="scoreX">0</div>
    </div>
    <div class="draw-card">
      <div class="draw-label">Draws</div>
      <div class="draw-num" id="scoreDraw">0</div>
    </div>
    <div class="score-card o-card">
      <div class="score-label">Player O</div>
      <div class="score-num" id="scoreO">0</div>
    </div>
  </div>

  <div class="controls">
    <button class="pill-btn active" id="btnPvP" onclick="setMode('pvp')">2 Players</button>
    <button class="pill-btn" id="btnAI" onclick="setMode('ai')">vs AI</button>
  </div>

  <div class="diff-row" id="diffRow" style="display:none;">
    <span class="diff-label">Difficulty —</span>
    <button class="pill-btn active" id="d-easy" onclick="setDiff('easy')">Easy</button>
    <button class="pill-btn" id="d-medium" onclick="setDiff('medium')">Medium</button>
    <button class="pill-btn" id="d-hard" onclick="setDiff('hard')">Hard</button>
  </div>

  <div class="status" id="status"><span class="who x-col">X</span> goes first</div>

  <div class="board" id="board"></div>

  <div class="actions">
    <button class="action-btn primary" onclick="resetGame()">New game</button>
    <button class="action-btn" onclick="resetScores()">Reset scores</button>
  </div>

  <div class="footer">Built with HTML · CSS · JavaScript</div>
</div>

<script>
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  let board, current, gameOver, mode = 'pvp', diff = 'easy';
  let scores = { X: 0, O: 0, D: 0 };

  function setMode(m) {
    mode = m;
    document.getElementById('btnPvP').classList.toggle('active', m === 'pvp');
    document.getElementById('btnAI').classList.toggle('active', m === 'ai');
    document.getElementById('diffRow').style.display = m === 'ai' ? 'flex' : 'none';
    resetGame();
  }

  function setDiff(d) {
    diff = d;
    ['easy', 'medium', 'hard'].forEach(x =>
      document.getElementById('d-' + x).classList.toggle('active', x === d)
    );
    resetGame();
  }

  function checkWin(b, p) {
    return WINS.find(([a, c, d]) => b[a] === p && b[c] === p && b[d] === p) || null;
  }

  function minimax(b, p, depth) {
    if (checkWin(b, 'O')) return { score: 10 - depth };
    if (checkWin(b, 'X')) return { score: depth - 10 };
    const empty = b.map((v, i) => v ? -1 : i).filter(i => i >= 0);
    if (!empty.length) return { score: 0 };
    const opp = p === 'O' ? 'X' : 'O';
    let best = p === 'O' ? { score: -Infinity, idx: -1 } : { score: Infinity, idx: -1 };
    for (let i of empty) {
      b[i] = p;
      const res = minimax(b, opp, depth + 1);
      b[i] = '';
      if (p === 'O' ? res.score > best.score : res.score < best.score)
        best = { score: res.score, idx: i };
    }
    return best;
  }

  function aiMove() {
    if (gameOver) return;
    const empty = board.map((v, i) => v ? -1 : i).filter(i => i >= 0);
    let idx;
    if (diff === 'easy') {
      idx = empty[Math.floor(Math.random() * empty.length)];
    } else if (diff === 'medium') {
      idx = Math.random() < 0.6
        ? minimax([...board], 'O', 0).idx
        : empty[Math.floor(Math.random() * empty.length)];
    } else {
      idx = minimax([...board], 'O', 0).idx;
    }
    placeMove(idx);
  }

  function placeMove(i) {
    if (gameOver || board[i]) return;
    board[i] = current;
    renderBoard();
    animateCell(i);
    const w = checkWin(board, current);
    if (w) { endGame(current, w); return; }
    if (board.every(c => c)) { endGame(null); return; }
    current = current === 'X' ? 'O' : 'X';
    setStatus();
    if (mode === 'ai' && current === 'O') setTimeout(aiMove, 380);
  }

  function animateCell(i) {
    const cells = document.getElementById('board').children;
    cells[i].classList.remove('pop');
    void cells[i].offsetWidth;
    cells[i].classList.add('pop');
  }

  function endGame(winner, winLine) {
    gameOver = true;
    if (winner) {
      scores[winner]++;
      updateScores();
      highlightWin(winLine);
      const col = winner === 'X' ? 'x-col' : 'o-col';
      document.getElementById('status').innerHTML =
        `<span class="who ${col}">${winner}</span> wins! 🎉`;
    } else {
      scores.D++;
      updateScores();
      document.getElementById('status').innerHTML =
        `<span class="who">Draw!</span> — well played`;
    }
  }

  function highlightWin(line) {
    const cells = document.getElementById('board').children;
    line.forEach(i => cells[i].classList.add('win-cell'));
  }

  function setStatus() {
    const col = current === 'X' ? 'x-col' : 'o-col';
    const aiNote = mode === 'ai' && current === 'O' ? ' (AI thinking…)' : '';
    document.getElementById('status').innerHTML =
      `<span class="who ${col}">${current}</span>'s turn${aiNote}`;
  }

  function updateScores() {
    document.getElementById('scoreX').textContent = scores.X;
    document.getElementById('scoreO').textContent = scores.O;
    document.getElementById('scoreDraw').textContent = scores.D;
  }

  function renderBoard() {
    const el = document.getElementById('board');
    el.innerHTML = '';
    board.forEach((v, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell' + (v ? ' taken ' + (v === 'X' ? 'x-mark' : 'o-mark') : '');
      cell.textContent = v;
      cell.setAttribute('aria-label', v ? `${v} placed` : `Cell ${i + 1}, empty`);
      cell.setAttribute('role', 'button');
      cell.onclick = () => placeMove(i);
      el.appendChild(cell);
    });
  }

  function resetGame() {
    board = Array(9).fill('');
    current = 'X';
    gameOver = false;
    setStatus();
    renderBoard();
  }

  function resetScores() {
    scores = { X: 0, O: 0, D: 0 };
    updateScores();
    resetGame();
  }

  resetGame();
</script>
</body>
</html>
